{% extends 'base.html' %}

{% block title %}Update Application Status - RecruitFlow{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4">Update Application Status</h3>
                    <p><strong>Candidate:</strong> {{ application.candidate.full_name }}</p>
                    <p><strong>Job:</strong> {{ application.job.title }}</p>
                    <hr>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="{{ form.status.id_for_label }}" class="form-label">Status</label>
                            {{ form.status }}
                        </div>
                        <button type="submit" class="btn btn-primary">Update Status</button>
                        <a href="{% url 'applications:job_applicants' application.job.id %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
