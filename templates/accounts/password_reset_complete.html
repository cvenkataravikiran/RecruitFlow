{% extends 'base.html' %}

{% block title %}Password Reset Complete - RecruitFlow{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-check-circle" style="font-size: 64px; color: var(--success-color);"></i>
                    </div>
                    <h2 class="mb-3">Password Reset Successful!</h2>
                    <p class="text-muted mb-4">
                        Your password has been successfully reset. 
                        You can now login with your new password.
                    </p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Login Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
