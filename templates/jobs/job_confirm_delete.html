{% extends 'base.html' %}

{% block title %}Delete Job - RecruitFlow{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-danger">Confirm Delete</h3>
                    <p>Are you sure you want to delete the job posting:</p>
                    <p class="fw-bold">{{ job.title }} at {{ job.company }}</p>
                    <p class="text-muted">This action cannot be undone.</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'dashboard:recruiter_dashboard' %}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
